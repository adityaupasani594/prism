<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PRISM Onboarding - Share Safely</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#c7c4d7",
                    "tertiary": "#8127cf",
                    "on-tertiary-container": "#fffbff",
                    "primary-fixed-dim": "#c0c1ff",
                    "error": "#ba1a1a",
                    "surface-tint": "#494bd6",
                    "on-error-container": "#93000a",
                    "secondary-container": "#2170e4",
                    "surface-bright": "#faf8ff",
                    "on-primary-fixed": "#07006c",
                    "primary-fixed": "#e1e0ff",
                    "surface-variant": "#dae2fd",
                    "inverse-on-surface": "#eef0ff",
                    "on-primary-fixed-variant": "#2f2ebe",
                    "surface-container-low": "#f2f3ff",
                    "tertiary-fixed": "#f0dbff",
                    "on-tertiary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-highest": "#dae2fd",
                    "on-secondary-fixed": "#001a42",
                    "on-error": "#ffffff",
                    "surface-container-high": "#e2e7ff",
                    "secondary-fixed": "#d8e2ff",
                    "error-container": "#ffdad6",
                    "outline": "#767586",
                    "inverse-surface": "#283044",
                    "primary": "#4648d4",
                    "surface-container": "#eaedff",
                    "surface-dim": "#d2d9f4",
                    "on-tertiary-fixed": "#2c0051",
                    "on-secondary-container": "#fefcff",
                    "primary-container": "#6063ee",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#fffbff",
                    "tertiary-container": "#9c48ea",
                    "on-background": "#131b2e",
                    "on-secondary-fixed-variant": "#004395",
                    "secondary": "#0058be",
                    "surface": "#faf8ff",
                    "on-surface-variant": "#464554",
                    "on-secondary": "#ffffff",
                    "background": "#faf8ff",
                    "on-surface": "#131b2e",
                    "inverse-primary": "#c0c1ff",
                    "secondary-fixed-dim": "#adc6ff",
                    "tertiary-fixed-dim": "#ddb7ff",
                    "on-tertiary-fixed-variant": "#6900b3"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .premium-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col items-center overflow-hidden">
<!-- Top Navigation Anchor -->
<header class="flex items-center justify-between px-6 py-6 w-full max-w-md mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="shield_lock">shield_lock</span>
<span class="font-headline tracking-tight font-extrabold text-xl bg-gradient-to-r from-[#4648d4] to-[#8127cf] bg-clip-text text-transparent">PRISM</span>
</div>
<button class="text-on-surface-variant font-label font-medium hover:opacity-80 transition-opacity">Skip</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center w-full max-w-md px-8 text-center pb-24">
<!-- Illustration Section -->
<div class="relative w-full aspect-square flex items-center justify-center mb-12">
<!-- Background Decorative Elements -->
<div class="absolute inset-0 bg-gradient-to-tr from-primary/10 to-tertiary/10 rounded-full blur-3xl opacity-60"></div>
<!-- Modern Minimal Illustration -->
<div class="relative z-10 w-64 h-64 bg-surface-container-lowest rounded-[2.5rem] shadow-[0_24px_48px_-12px_rgba(19,27,46,0.08)] flex items-center justify-center p-8 border border-white/50">
<div class="relative">
<!-- Central Shield/Lock Motif -->
<div class="w-32 h-32 rounded-full bg-gradient-to-br from-primary to-tertiary flex items-center justify-center shadow-xl shadow-primary/20">
<span class="material-symbols-outlined text-white text-5xl" data-icon="share_reviews" style="font-variation-settings: 'FILL' 0;">share_reviews</span>
</div>
<!-- Floating Data Bits -->
<div class="absolute -top-4 -right-4 w-14 h-14 bg-surface-container-highest rounded-2xl flex items-center justify-center shadow-lg border border-white/20">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<div class="absolute -bottom-2 -left-6 w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-md border border-outline-variant/10">
<span class="material-symbols-outlined text-on-surface-variant text-xl" data-icon="key">key</span>
</div>
</div>
</div>
<!-- Contextual Ghost Elements -->
<div class="absolute top-1/2 left-0 w-16 h-1 bg-gradient-to-r from-transparent to-primary/20 rounded-full"></div>
<div class="absolute top-1/2 right-0 w-16 h-1 bg-gradient-to-l from-transparent to-tertiary/20 rounded-full"></div>
</div>
<!-- Typography Hook -->
<div class="space-y-4">
<h1 class="font-headline text-[2rem] font-extrabold text-on-surface tracking-tight leading-tight">
                Share Safely
            </h1>
<p class="text-on-surface-variant text-base leading-relaxed px-4">
                Only share what is necessary using secure verification
            </p>
</div>
</main>
<!-- Bottom Navigation Shell (Suppressing BottomNavBar as per Transactional/Onboarding rule, using customized persistent controls) -->
<div class="fixed bottom-0 left-0 w-full p-8 flex flex-col items-center gap-8 bg-gradient-to-t from-surface via-surface/90 to-transparent">
<!-- Progress Indicator (Execution from Task: 3 dots, second active) -->
<div class="flex justify-center items-center gap-3">
<!-- Inactive dot -->
<div class="w-2 h-2 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
<!-- Active dot (Style from BottomNavBar active mapping) -->
<div class="w-3 h-3 bg-gradient-to-r from-[#4648d4] to-[#8127cf] rounded-full scale-125"></div>
<!-- Inactive dot -->
<div class="w-2 h-2 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
<!-- Call to Action -->
<div class="w-full max-w-md">
<button class="w-full py-5 px-8 rounded-full bg-gradient-to-r from-primary to-tertiary text-on-primary font-headline font-bold text-lg shadow-[0_8px_24px_-4px_rgba(70,72,212,0.4)] hover:opacity-90 active:scale-95 transition-all duration-200 flex items-center justify-center gap-3">
                Next
                <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</body></html>
