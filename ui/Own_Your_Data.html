<!-- Top Navigation Anchor (Suppressed shell, but keeping logo branding as per identity) -->
<header class="flex items-center justify-between px-6 py-8 w-full max-w-xl">

<main class="flex-1 w-full max-w-xl px-8 flex flex-col justify-center">

<div class="relative w-full aspect-square flex items-center justify-center mb-8">

<span class="material-symbols-outlined text-tertiary text-3xl" data-icon="database">database</span>
</div>
<div class="absolute top-1/2 -left-10 w-16 h-16 bg-surface-container-lowest rounded-2xl shadow-xl flex items-center justify-center -rotate-12 border border-outline-variant/10">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="fingerprint">fingerprint</span>
</div>
<!-- Central Icon with Ambient Glow -->
<div class="relative mb-6">
<div class="absolute inset-0 bg-primary/20 blur-2xl rounded-full scale-150"></div>
<div class="relative bg-gradient-to-br from-primary to-tertiary w-24 h-24 rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-5xl" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
</div>
<!-- Content Placeholder Text -->
<div class="space-y-3 w-full">
<div class="h-2 w-3/4 bg-surface-container-high rounded-full opacity-60"></div>
<div class="h-2 w-full bg-surface-container-high rounded-full opacity-60"></div>
<div class="h-2 w-1/2 bg-surface-container-high rounded-full opacity-60"></div>
</div>
</div>
</div>
</div>
</div>

                Own Your Data
            </h1>
<p class="font-body text-lg text-on-surface-variant max-w-xs leading-relaxed">

            </p>

<footer class="w-full max-w-xl px-8 flex flex-col items-center pb-6 pt-12 gap-8">
